name: photo_player
description: Photo and video slideshow player

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  file_picker: ^6.1.1
  permission_handler: ^11.1.0
  video_player: ^2.8.1
  path_provider: ^2.1.1
  path: ^1.8.3
  provider: ^6.1.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
