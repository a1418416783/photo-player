name: photo_player
description: Advanced photo and video player app

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  file_picker: ^6.1.1
  video_player: ^2.8.1
  path: ^1.8.3
  provider: ^6.1.1
  
  # 新增依赖
  shared_preferences: ^2.2.2  # 保存收藏和设置
  share_plus: ^7.2.1          # 分享功能
  audioplayers: ^5.2.1        # 背景音乐
  path_provider: ^2.1.1       # 文件路径

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # 添加示例音乐文件（可选）
  assets:
    - assets/music/
